<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="55%" stop-color="#f5b800"/>
      <stop offset="100%" stop-color="#a87a0e"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" rx="12" fill="url(#g)"/>

  <!-- Faixa arco-íris no rodapé do "card" -->
  <g transform="translate(0, 59)" clip-path="inset(0 round 0 0 12 12)">
    <rect x="0" y="0" width="9" height="5" fill="#ef4444"/><rect x="8" y="0" width="9" height="5" fill="#f97316"/><rect x="16" y="0" width="9" height="5" fill="#eab308"/><rect x="24" y="0" width="9" height="5" fill="#10b981"/><rect x="32" y="0" width="9" height="5" fill="#06b6d4"/><rect x="40" y="0" width="9" height="5" fill="#3b82f6"/><rect x="48" y="0" width="9" height="5" fill="#8b5cf6"/><rect x="56" y="0" width="9" height="5" fill="#ec4899"/>
  </g>

  <!-- Pequena silhueta do troféu acima do "26" -->
  <g fill="#0a0a0f" opacity="0.92" transform="translate(29.5, 10.24)">
    <rect x="0" y="0" width="5" height="6" rx="1"/>
    <rect x="1.5" y="6" width="2" height="2.0999999999999996"/>
    <rect x="-0.25" y="7.92" width="5.5" height="1.5" rx="0.25"/>
  </g>

  <!-- "26" central, inspirado na tipografia chunky da identidade -->
  <text x="50%" y="39.68"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Inter Tight, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-weight="900"
        font-size="33"
        fill="#0a0a0f"
        letter-spacing="-1.98">
    26
  </text>
</svg>